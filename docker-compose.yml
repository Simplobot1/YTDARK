version: '3.8'

services:
  ytdark:
    build: .
    container_name: ytdark
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./temp:/app/temp
      - ./credentials:/app/credentials
      - ./canais:/app/canais
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
